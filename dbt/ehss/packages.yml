# dbt hub packages, installed with `dbt deps`. These are dbt packages, not pip
# packages: dbt-utils and dbt-expectations have no PyPI distribution and are
# resolved here, per PRD section 3.
packages:
  - package: dbt-labs/dbt_utils
    version: [">=1.1.0", "<2.0.0"]
  # dbt_expectations is maintained under metaplane (calogica is deprecated).
  - package: metaplane/dbt_expectations
    version: [">=0.10.0", "<0.11.0"]
